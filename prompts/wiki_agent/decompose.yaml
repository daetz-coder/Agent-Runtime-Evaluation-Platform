name: wiki_agent/decompose
version: 1
status: active
description: 复杂问题拆解 Prompt（将复杂问题分解为独立子问题）
author: zhanyong
created_at: "2026-07-07"

variables:
  - name: query
    description: 复杂问题

template: |
  请将以下复杂问题拆解为 2-3 个独立的子问题，每个子问题可以独立检索。
  要求：
  - 子问题之间互不依赖
  - 合在一起能覆盖原始问题的全部信息需求
  - 每行一个问题，不要编号

  复杂问题：{query}

  子问题：
