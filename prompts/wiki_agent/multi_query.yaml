name: wiki_agent/multi_query
version: 1
status: active
description: Multi-Query 改写 Prompt（从不同角度生成多个搜索查询）
author: zhanyong
created_at: "2026-07-07"

variables:
  - name: query
    description: 原始查询

template: |
  请将以下查询改写为 3 个不同角度的搜索查询，以提高检索召回率。
  要求：
  - 每个改写保持原始语义，但从不同角度表述
  - 改写 1：同义词替换
  - 改写 2：更具体的描述
  - 改写 3：更抽象/概括的描述
  - 每行一个查询，不要编号

  原始查询：{query}

  改写查询：
