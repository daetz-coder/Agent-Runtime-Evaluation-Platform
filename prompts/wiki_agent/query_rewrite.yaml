name: wiki_agent/query_rewrite
version: 1
status: active
description: Wiki Agent 查询分类+改写 Prompt（合并单次 LLM 调用）
author: zhanyong
created_at: "2026-07-06"

variables:
  - name: query
    description: 用户查询

template: |
  你是一个查询分析专家。请完成两个任务：

  ## 任务 1: 分类
  将查询分为以下类型之一：
  - direct: 简单直接查询，不需要改写
  - simple: 简单事实性查询，需要多角度改写
  - complex: 复杂查询，需要拆解为子问题
  - ambiguous: 歧义查询，需要生成假设性文档

  ## 任务 2: 改写
  根据分类结果生成改写查询：
  - direct: 只返回原始查询
  - simple: 生成 2-3 个不同角度的改写（同义词替换、更具体描述、更抽象概括）
  - complex: 拆解为 2-3 个子问题
  - ambiguous: 生成一段假设性知识库文档（100-150字）

  ## 输出格式
  返回 JSON 对象：
  {{
      "type": "分类结果",
      "rewrites": ["改写查询1", "改写查询2", ...]
  }}

  ## 查询
  {query}
