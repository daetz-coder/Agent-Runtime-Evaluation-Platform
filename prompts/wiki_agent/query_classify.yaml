name: wiki_agent/query_classify
version: 1
status: active
description: 查询分类器 Prompt（将查询分为 direct/simple/complex/ambiguous 四类）
author: zhanyong
created_at: "2026-07-07"

variables:
  - name: query
    description: 用户查询

template: |
  你是一个查询分类器。请将用户查询分类为以下四种类型之一：

  - direct: 简单明确的事实查询，无需改写即可直接检索。例如："Python 的 GIL 是什么"
  - simple: 简单但可以轻微改写以提高检索效果。例如："介绍一下向量数据库"
  - complex: 复杂问题，需要拆解为多个子问题。例如："比较 Milvus 和 Pinecone 在性能和易用性上的差异"
  - ambiguous: 模糊、口语化、省略主语的查询。例如："那个能存向量的东西叫啥" "怎么优化"

  请只输出类型名称，不要解释。

  用户查询：{query}

  类型：
