name: wiki_agent/hyde
version: 1
status: active
description: HyDE 假设性文档生成 Prompt（生成能回答问题的假设性文档片段）
author: zhanyong
created_at: "2026-07-07"

variables:
  - name: query
    description: 用户问题

template: |
  请根据以下问题，生成一段假设性的知识库文档内容（约 100-150 字）。
  这段文档应该像是知识库中真实存在的、能够回答该问题的文档片段。

  问题：{query}

  假设性文档：
