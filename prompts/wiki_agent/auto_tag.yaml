name: wiki_agent/auto_tag
version: 1
status: active
description: Wiki Agent 自动标签生成 Prompt
author: zhanyong
created_at: "2026-07-06"

variables:
  - name: title
    description: 文档标题
  - name: content_preview
    description: 文档内容（前 500 字）
  - name: existing_tags
    description: 现有标签（尽量复用）

template: |
  你是一个知识库标签生成器。根据文档标题和内容，生成 3-5 个简洁的标签。

  ## 文档标题
  {title}

  ## 文档内容（前 500 字）
  {content_preview}

  ## 现有标签（尽量复用）
  {existing_tags}

  ## 要求
  1. 每个标签 2-5 个中文字或英文字
  2. 优先复用已有标签
  3. 标签应该描述文档的核心主题
  4. 返回 JSON: {{"tags": ["标签1", "标签2", ...]}}
