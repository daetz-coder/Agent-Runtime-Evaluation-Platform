# =============================================================================
# Agent Runtime Evaluation Platform — Docker Compose
# =============================================================================
#
# 三种部署模式：
#
#   🔹 最小部署（单容器，无外部依赖）
#     docker compose up backend
#
#   🔹 带 Redis 缓存
#     docker compose up backend redis
#
#   🔹 全量部署（缓存 + 异步队列）
#     docker compose up -d --profile full
#
# =============================================================================

services:

  # ── 主应用（FastAPI + Evaluators + Wiki Agent + 前端） ─────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-eval-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_ENV: production
      DEBUG: "false"
      # 数据库（默认 SQLite，生产建议换 PostgreSQL）
      DATABASE_URL: sqlite+aiosqlite:///./data/agent_eval.db
      # Redis（可选 — 不配置则自动降级）
      REDIS_URL: redis://redis:6379/0
      # LLM API Keys（必须在 .env 中至少配置一个）
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      ZHIPUAI_API_KEY: ${ZHIPUAI_API_KEY:-}
      QWEN_API_KEY: ${QWEN_API_KEY:-}
    volumes:
      # 持久化所有运行时数据
      - wiki_data:/opt/agent-eval/app/wiki_agent/data
      - app_data:/opt/agent-eval/data
      # 模型缓存（避免容器重启后重新下载 sentence-transformers）
      - model_cache:/model-cache
    # 不硬依赖 Redis/Celery——后端会自动降级
    depends_on: {}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ── Redis（可选 — LLM 缓存 + 限流 + Celery Broker） ────────────────
  redis:
    image: redis:7-alpine
    container_name: agent-eval-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    profiles:
      - full

  # ── Celery Worker（可选 — 异步评估任务队列） ──────────────────────
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-eval-celery
    restart: unless-stopped
    command: celery -A app.celery_app worker -l info -c 4 -Q evaluation --max-tasks-per-child=50
    env_file:
      - .env
    environment:
      APP_ENV: production
      DEBUG: "false"
      DATABASE_URL: sqlite+aiosqlite:///./data/agent_eval.db
      REDIS_URL: redis://redis:6379/0
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      ZHIPUAI_API_KEY: ${ZHIPUAI_API_KEY:-}
      QWEN_API_KEY: ${QWEN_API_KEY:-}
    volumes:
      - wiki_data:/opt/agent-eval/app/wiki_agent/data
      - app_data:/opt/agent-eval/data
      - model_cache:/model-cache
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_started
    profiles:
      - full

volumes:
  wiki_data:      # Wiki Agent 运行时数据（SQLite / Milvus / BM25 / Knowledge）
  app_data:       # 主平台数据（agent_eval.db）
  model_cache:    # 模型缓存（sentence-transformers）
  redis_data:     # Redis 持久化
