# Reasonix configuration.
# Resolution order: flag > ./reasonix.toml > ~/AppData/Roaming/reasonix/config.toml > built-in defaults.
# Secrets come from the environment via api_key_env; never put keys here.

config_version = 3   # schema marker for diagnostics; old versions may ignore it
default_model = "deepseek-flash"
# language      = "zh"   # ui/model language; empty = auto-detect from $LANG / $REASONIX_LANG

[agent]
# system_prompt = """..."""   # omit to use the built-in prompt for this version
# system_prompt_file = "prompts/system.md"   # overrides system_prompt when set
# max_steps         = 0   # executor tool-call rounds; 0 = no limit
# planner_max_steps = 12   # planner read-only tool-call rounds; 0 = no limit
temperature       = 0.0
auto_plan   = "off"   # off|on; off keeps plan mode manual
# reasoning_language = "zh"   # visible reasoning language: auto|zh|en
# auto_plan_classifier = "deepseek-flash"   # optional; only used for borderline tasks
soft_compact_ratio  = 0.5   # notice only; keeps cache-first prefix intact
compact_ratio       = 0.8   # try compacting when prompt reaches this fraction
compact_force_ratio = 0.9   # force compacting at this high-water mark
# keep                = ["errors"]   # compaction keep policy: errors, user_marked
# recent_keep         = 2   # minimum recent messages kept verbatim
cold_resume_prune   = true   # elide stale tool results when reopening a session past the provider cache window
# planner_model = "mimo"   # optional: enable two-model collaboration
# subagent_model = "deepseek-pro"   # optional default for runAs=subagent skills
# subagent_models = { review = "deepseek-pro", security_review = "deepseek-pro" }   # per-skill overrides
# subagent_effort = "high"   # optional default effort for subagents
# subagent_efforts = { review = "max", task = "high" }   # per-tool/skill effort overrides
# output_style = "explanatory"   # explanatory | learning | concise | custom; empty = default

[tools]
enabled = []   # empty = all built-in tools
bash_timeout_seconds = 120   # foreground safety cap; set 0 for no tool-local cap

[tools.background_jobs]
stalled_warning_seconds = 900   # warn once per background job after this many quiet seconds; 0 disables

[lsp]
enabled = true   # language server tools; servers launch lazily when used
# [lsp.servers.go]
# command = "gopls"
# args = []
# extensions = [".go"]

[skills]
# paths = ["~/my-skills", "../shared/skills"]   # extra custom skill roots
# excluded_paths = ["~/.agents/skills"]   # hide convention roots without deleting folders
# max_depth = 3   # nested scan depth; set 1 for legacy root-only discovery
# disabled_skills = ["review"]   # hide noisy or unwanted skills

[permissions]
# Per-call gating. mode = writer fallback when no rule matches: ask|allow|deny.
# Readers always default to allow. Precedence: deny > ask > allow > fallback.
# Rules are "Tool" or "Tool(specifier)"; e.g. Bash(go test:*), Edit(src/**).
mode  = "allow"
# deny = ["Bash(rm -rf*)", "Bash(git push*)"]   # hard-blocked in every mode
allow = ["Edit", "explore", "Bash(cd \"D:/Agent Runtime Evaluation Platform\" && find \"example/wiki-agent/knowledge\" -name \"*.md\" | sort)", "Bash(cd \"D:/Agent Runtime Evaluation Platform\" && python -m tests.eval_evaluator_accuracy 2>&1)", "Bash(cd \"D:/Agent Runtime Evaluation Platform\" && python -c \"\ncontent = open('tests/eval_evaluator_accuracy.py', 'r', encoding='utf-8').read()\ncontent = content.replace('datetime.utcnow().isoformat()', 'datetime.now(timezone.utc).isoformat()')\nopen('tests/eval_evaluator_accuracy.py', 'w', encoding='utf-8').write(content)\nprint('Done')\n\")", "Bash(cd \"D:/Agent Runtime Evaluation Platform\" && python -c \"\ncontent = open('tests/eval_evaluator_accuracy.py', 'r', encoding='utf-8').read()\n# Replace emoji with ASCII equivalents\ncontent = content.replace('\\u26a0', '!!')  # ⚠ -> !!\ncontent = content.replace('\\u2705', '[OK]')  # ✅\ncontent = content.replace('\\u274c', '[FAIL]')  # ❌\nopen('tests/eval_evaluator_accuracy.py', 'w', encoding='utf-8').write(content)\nprint('Done')\n\")", "Bash(cd \"D:/Agent Runtime Evaluation Platform\" && pip install langchain-anthropic 2>&1 | tail -5)", "Bash(cd \"D:/Agent Runtime Evaluation Platform\" && pip install -e \".[dev]\" 2>&1 | tail -5)", "Bash(cd \"D:/Agent Runtime Evaluation Platform\" && SET PYTHONIOENCODING=utf-8 && python -c \"\nimport asyncio\nfrom app.evaluators import PlanningEvaluator\nfrom app.models.schemas import TrajectoryStep\nfrom datetime import datetime, timezone\n\nasync def test():\n    e = PlanningEvaluator()\n    steps = [TrajectoryStep(\n        step_number=1, action_type='plan',\n        action_detail={'goal': 'test', 'steps': [{'description': 'step1'}]},\n        timestamp=datetime.now(timezone.utc).isoformat()\n    )]\n    try:\n        r = await e.evaluate(goal='test goal', trajectory=steps[:1])\n        print(f'Score: {r.overall}')\n    except Exception as ex:\n        print(f'Error: {ex}')\n\nasyncio.run(test())\n\" 2>&1)", "Bash(cd \"D:/Agent Runtime Evaluation Platform\" && PYTHONIOENCODING=utf-8 python -c \"\nimport asyncio\nfrom app.evaluators import PlanningEvaluator\nfrom app.models.schemas import TrajectoryStep\nfrom datetime import datetime, timezone\n\nasync def test():\n    e = PlanningEvaluator()\n    steps = [TrajectoryStep(\n        step_number=1, action_type='plan',\n        action_detail={'goal': 'test', 'steps': [{'description': 'step1'}]},\n        timestamp=datetime.now(timezone.utc).isoformat()\n    )]\n    try:\n        r = await e.evaluate(goal='test goal', trajectory=steps[:1])\n        print(f'Score: {r.overall}')\n    except Exception as ex:\n        print(f'Error: {ex}')\n\nasyncio.run(test())\n\" 2>&1)", "Bash(PYTHONIOENCODING=utf-8 cd \"D:/Agent Runtime Evaluation Platform\" && python -m tests.eval_evaluator_accuracy 2>&1)", "Bash(cd \"D:/Agent Runtime Evaluation Platform\" && python -m tests.benchmark_evaluators 2>&1)", "Bash(ls \"D:/Agent Runtime Evaluation Platform/example/\" | sort)", "Bash(cd \"D:/Agent Runtime Evaluation Platform\" && python -c \"import ast; ast.parse(open('tests/eval_retrieval.py','r',encoding='utf-8').read()); ast.parse(open('tests/benchmark_evaluators.py','r',encoding='utf-8').read()); ast.parse(open('tests/eval_evaluator_accuracy.py','r',encoding='utf-8').read()); print('All 3 scripts parse OK')\" 2>&1)", "Bash(cd \"D:/Agent Runtime Evaluation Platform\" && python -m tests.benchmark_multimodel 2>&1)", "Bash(cd \"D:/Agent Runtime Evaluation Platform/example/resume\" && xelatex -interaction=nonstopmode resume-zh_CN-zhanyong.tex 2>&1 | tail -20)", "Bash(cd \"D:/Agent Runtime Evaluation Platform\" && python -m tests.benchmark_score_distribution 2>&1)", "Bash(cd \"D:/Agent Runtime Evaluation Platform\" && python -m tests.eval_retrieval_standalone 2>&1)", "Bash(cd \"D:/Agent Runtime Evaluation Platform/example/resume\" && xelatex -interaction=nonstopmode resume-zh_CN-zhanyong.tex 2>&1 | tail -5)", "Bash(cd \"D:/Agent Runtime Evaluation Platform/example/resume\" && xelatex -interaction=nonstopmode resume-zh_CN-zhanyong.tex 2>&1 | tail -3)", "Bash(cd \"D:/Agent Runtime Evaluation Platform\" && python -c \"import ast; ast.parse(open('app/adapters/langgraph.py','r',encoding='utf-8').read()); print('OK')\" 2>&1)", "Bash(cd \"D:/Agent Runtime Evaluation Platform\" && python -m tests.test_adapters 2>&1)", "Bash(cd \"D:/Agent Runtime Evaluation Platform\" && python -c \"\nfrom app.adapters.llm_proxy import ProxyChatModel\nfrom langchain_openai import ChatOpenAI\nraw = ChatOpenAI(model='test', openai_api_key='sk-test', openai_api_base='http://127.0.0.1:9999')\np = ProxyChatModel(original_llm=raw)\n# Test if _original_llm is accessible\nprint('has _original_llm:', hasattr(p, '_original_llm'))\nimport inspect\n# Check MRO\nprint('MRO:', [c.__name__ for c in type(p).__mro__])\n# Check if it's in __dict__\nprint('in __dict__:', '_original_llm' in p.__dict__)\nprint('model_extra:', p.__pydantic_private__ if hasattr(p, '__pydantic_private__') else 'N/A')\nprint('raw model_fields:', list(p.model_fields.keys())[:5] if hasattr(p, 'model_fields') else 'N/A')\n\" 2>&1)", "Bash(cd \"D:/Agent Runtime Evaluation Platform\" && python -c \"\nfrom langgraph.graph import StateGraph\nfrom typing import TypedDict\n\nclass TestState(TypedDict):\n    counter: int\n    message: str\n\ndef sync_node(state: TestState) -> dict:\n    return {'counter': state['counter'] + 1, 'message': 'done'}\n\ng = StateGraph(TestState)\ng.add_node('s', sync_node)\ng.set_entry_point('s')\ng.set_finish_point('s')\n# Test without instrumentation\nc = g.compile()\nprint('Compile OK:', type(c).__name__)\n\n# Now try with instrumentation\nfrom app.adapters.langgraph import instrument_langgraph\ng2 = StateGraph(TestState)\ng2.add_node('s', sync_node)\ng2.set_entry_point('s')\ng2.set_finish_point('s')\ni = instrument_langgraph(g2)\nprint('Instrument OK:', type(i).__name__)\nc2 = i.compile()\nprint('Compile 2 OK:', type(c2).__name__)\n\" 2>&1)", "Bash(cd \"D:/Agent Runtime Evaluation Platform\" && python -c \"\nimport traceback\ntry:\n    from langgraph.graph import StateGraph\n    from typing import TypedDict\n\n    class TestState(TypedDict):\n        counter: int\n        message: str\n\n    def sync_node(state: TestState) -> dict:\n        return {'counter': state['counter'] + 1, 'message': 'done'}\n\n    from app.adapters.langgraph import instrument_langgraph\n    g2 = StateGraph(TestState)\n    g2.add_node('s', sync_node)\n    g2.set_entry_point('s')\n    g2.set_finish_point('s')\n    i = instrument_langgraph(g2)\n    c2 = i.compile()\nexcept Exception as e:\n    traceback.print_exc()\n\" 2>&1)", "Bash(python -c \"\nimport langgraph.graph.state as s\nimport inspect\nsrc = inspect.getsource(s.StateGraph.validate)\n# Find the specific line about spec.ends\nfor i, line in enumerate(src.split('\\n'), 1):\n    if 'spec.ends' in line or 'spec' in line and 'ends' in line:\n        print(f'{i}: {line}')\n# Also find what spec is\nfor i, line in enumerate(src.split('\\n'), 1):\n    if 'spec =' in line or '= spec' in line:\n        print(f'{i}: {line}')\n\" 2>&1 | head -30)", "Bash(python -c \"\nimport langgraph.graph.state as s\nimport inspect\nsrc = inspect.getsource(s.StateGraph.validate)\nfor i, line in enumerate(src.split(chr(10)), 1):\n    if 1 <= i <= 50:\n        print(f'{i}: {line}')\n\" 2>&1)", "Bash(python -c \"\nfrom langgraph.graph import StateGraph\nfrom typing import TypedDict\n\nclass TestState(TypedDict):\n    counter: int\n\ndef sync_node(state: TestState) -> dict:\n    return {'counter': 1}\n\ng = StateGraph(TestState)\ng.add_node('s', sync_node)\n# Inspect the node spec\nspec = g.nodes['s']\nprint('type:', type(spec).__name__)\nprint('dir:', [a for a in dir(spec) if not a.startswith('_')])\nprint('ends:', getattr(spec, 'ends', 'N/A'))\nprint('func/runnable:', getattr(spec, 'runnable', getattr(spec, 'func', 'N/A')))\n\" 2>&1)", "Bash(cd \"D:/Agent Runtime Evaluation Platform\" && python -m pytest tests/test_evaluators.py tests/test_api.py -v 2>&1 | tail -20)", "Bash(cd \"D:/Agent Runtime Evaluation Platform\" && git status --short 2>&1)", "Bash(cd \"D:/Agent Runtime Evaluation Platform\" && git add -A && git commit -m \"feat(eval): add multi-trajectory benchmark, retrieval eval, evaluator accuracy verification; update resume with real metrics\n\n- tests/benchmark_score_distribution.py: 6 trajectories x 5 evaluators, scoring monotonicity, Pearson correlation\n- tests/benchmark_multimodel.py: DeepSeek vs GPT-4o cost comparison (27x)\n- tests/benchmark_evaluators.py: latency/cost benchmark at 10/25/50 steps\n- tests/eval_retrieval_standalone.py: 20 queries x 3 strategies (BM25/Semantic/Hybrid) retrieval comparison\n- tests/eval_evaluator_accuracy.py: good/bad/adversarial/empty trajectory validation\n- example/resume/resume-zh_CN-zhanyong.tex: all metrics from real runs added\n- example/resume/resume.cls: contactInfo font changed to rmfamily (Times New Roman)\" && git push 2>&1)"]
# ask = ["Edit(src/**)"]   # force a prompt even if otherwise allowed

[sandbox]
# Confine tool blast radius. File-writers (write_file/edit_file/multi_edit/move_file)
# may only write under workspace_root (empty = current dir) and allow_write extras.
# bash = "enforce" (default) jails each command in an OS sandbox (macOS now;
# graceful fallback elsewhere); "off" disables it. network allows egress.
# workspace_root = ""            # default: current working directory
# allow_write = ["/tmp"]          # extra dirs writers may also modify
bash    = "enforce"
network = true

[statusline]
# A custom status line: a command whose first stdout line replaces the built-in
# data row. It receives {"model","contextUsed","contextWindow","cwd"} as JSON on stdin.
# command = "my-statusline.sh"

# External MCP servers. type: "stdio" (default, a subprocess) | "http" | "sse".
# ${VAR} / ${VAR:-default} are expanded from the environment in command/args/env/url/headers.
# [[plugins]]
# name    = "example"
# command = "reasonix-plugin-example"
# [[plugins]]                                  # a remote server over Streamable HTTP
# name    = "stripe"
# type    = "http"
# url     = "https://mcp.stripe.com"
# headers = { Authorization = "Bearer ${STRIPE_KEY}" }
