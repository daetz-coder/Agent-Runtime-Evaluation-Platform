    # 项目详情
    projects:
      - name: Agent Runtime Evaluation Platform
        start_date: 2025-03
        summary: 面向 Agent 开发者的运行时质量评估平台，解决 "Demo 成功但上线不稳定" 痛点
        highlights:
          - 设计 3 个原创评估维度：Planning Quality Score、Memory Retention Score、Replan Evaluation
          - Adapter 模式支持 LangGraph / LLM Proxy / Callback 三种接入，一行代码集成
          - StateGraph 编排五阶段评估流水线，ECharts 雷达图/趋势图/热力图可视化
          - 采用 DeepSeek API，单次评估成本降低 97%

      - name: Wiki-Agent
        start_date: 2025-05
        summary: 基于 LangGraph 的 AI Agent，对话式管理知识库，支持 Human-in-the-Loop
        highlights:
          - StateGraph 实现 search → respond → decide → execute，Checkpoint 持久化支持断点续跑
          - BM25 + BGE-M3 + RRF 融合排序，检索准确率提升 23%
          - Markdown + ChromaDB + BM25 + Git 四路实时同步，SSE 流式输出延迟 < 100ms

      - name: git-reporter
        start_date: 2026-04
        summary: 基于 Git 历史的效能分析系统，集成 Claude Code Skill
        highlights:
          - 实现代码质量、开发效率、团队协作、技术债务四维度深度分析
          - 公交车系数、专注时间、上下文切换、返工比例等 10+ 指标
          - 自动识别 TODO/FIXME/HACK，计算 "债务利息"，生成清理优先级建议

    # 专业技能
    skills:
      - label: Agent 开发
        details: LangGraph 状态图 Agent、Human-in-the-Loop、Checkpoint、RAG（BM25 + BGE + RRF）、ChromaDB、SSE

      - label: LLM 集成
        details: DeepSeek / GLM-4 API、Claude Code Skill、Prompt 设计、多轮对话、Token 成本优化

      - label: 后端开发
        details: "Python / FastAPI / SQLAlchemy / Pydantic；熟悉：SpringBoot"

      - label: 前端开发
        details: "Vue 3 / TypeScript / Element Plus / ECharts；了解：React"

      - label: 其他
