# =============================================================================
# Agent Runtime Evaluation Platform — Nginx 配置
# =============================================================================
# 生产环境反代：HTTPS + 静态文件缓存 + Gzip + API 转发
#
# 使用方式（配合 docker compose --profile full）：
#   1. 将 SSL 证书放入 ./nginx/certs/
#   2. 修改 server_name 为你的域名
#   3. docker compose up -d --profile full
# =============================================================================

upstream backend {
    server backend:8000;
    keepalive 32;
}

# ── HTTP → HTTPS 跳转（生产环境） ──────────────────────────────────────
server {
    listen 80;
    server_name your-domain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # SSL（生产环境需提供证书）
    # ssl_certificate     /etc/nginx/certs/fullchain.pem;
    # ssl_certificate_key /etc/nginx/certs/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── 静态资源（前端构建产物） ──────────────────────────────────────
    # 注：基础 docker compose up backend 时，后端自己 serve 前端。
    # 这里仅为需要独立 Nginx 反代的场景提供配置参考。
    # root /usr/share/nginx/html;
    # index index.html;

    # ── Gzip 压缩 ────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_vary on;

    # ── 前端 SPA ────────────────────────────────────────────────────
    location / {
        # 如前端文件由 Nginx 直接 serve，取消注释以下行
        # try_files $uri $uri/ /index.html;

        # 默认代理到后端（后端已集成前端 SPA fallback）
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API 代理 ────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 支持（不缓冲流式响应）
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # ── SSE 流式端点 ────────────────────────────────────────────────
    location /api/chat/stream {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 必需配置
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
    }

    # ── WebSocket（LangGraph 流式支持） ──────────────────────────────
    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # ── 文档 ────────────────────────────────────────────────────────
    location /docs {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── 健康检查（不记录日志） ───────────────────────────────────────
    location /health {
        access_log off;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
    }

    # ── 指标 ────────────────────────────────────────────────────────
    location /metrics {
        access_log off;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
